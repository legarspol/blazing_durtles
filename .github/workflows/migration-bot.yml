name: Migration bot

on:
  schedule:
    - cron: '0 6 * * *'    # about 7am London
    - cron: '0 16 * * *'   # about 5pm London
  workflow_dispatch:        # manual trigger button for testing

# Never let two runs overlap (cron + manual, or a slow run meeting the next cron)
concurrency:
  group: migration-bot
  cancel-in-progress: false

permissions:
  contents: write
  issues: write
  pull-requests: write
  id-token: write   # required for the Claude GitHub App OIDC token exchange

env:
  # The model every pipeline agent (coder, reviewer, fix) uses.
  # Change it here once instead of in each step's claude_args.
  CLAUDE_MODEL: claude-sonnet-5

jobs:
  migrate:
    runs-on: ubuntu-latest
    steps:
      # fetch-depth 0 is required: the reviewer diffs the branch against main,
      # which needs full history. Do not "optimize" this to a shallow clone.
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Pick next ticket
        id: pick
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          ISSUE=$(gh issue list --label ai-task --label ready --state open \
            --json number --jq 'sort_by(.number) | .[0].number // empty')
          if [ -z "$ISSUE" ]; then
            echo "No ready ai-task issues. Nothing to do."
          fi
          echo "issue=$ISSUE" >> "$GITHUB_OUTPUT"

      - name: Coder
        id: coder
        if: steps.pick.outputs.issue != ''
        uses: anthropics/claude-code-action@v1
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          github_token: ${{ github.token }}
          # Prompt file is read by Claude itself: works on any action version,
          # no dependency on a specific CLI flag being supported.
          prompt: "Read .github/prompts/coder.md and follow it exactly. The issue number is ${{ steps.pick.outputs.issue }}."
          # CI is non-interactive: any tool not in an allowlist is auto-denied (no
          # human to approve). A narrow allowlist silently burned the coder's turns
          # on denied calls until it hit the cap. On an ephemeral runner the right
          # answer is to skip the permission gate entirely, not to play allowlist
          # whack-a-mole. Turn budget also raised: issue work + a full ./gradlew
          # build is genuinely turn-hungry.
          claude_args: '--model ${{ env.CLAUDE_MODEL }} --max-turns 60 --dangerously-skip-permissions'

      # Capture the full turn-by-turn execution log as an artifact so failures can
      # be diagnosed from the transcript instead of guessing. if: always() so we
      # still get it when the step fails. Each Claude step overwrites this file, so
      # we upload immediately after each one.
      - name: Upload coder log
        if: always() && steps.pick.outputs.issue != ''
        uses: actions/upload-artifact@v4
        with:
          name: coder-log
          path: ${{ runner.temp }}/claude-execution-output.json
          if-no-files-found: ignore

      # If the coder hit its escape hatch (labeled the issue blocked and stopped),
      # no branch exists. Everything downstream is pointless without one, so we
      # gate the rest of the pipeline on this check instead of failing cryptically.
      - name: Check branch exists
        if: steps.pick.outputs.issue != ''
        id: branch
        env:
          ISSUE: ${{ steps.pick.outputs.issue }}
        run: |
          if git ls-remote --exit-code --heads origin "ai/issue-$ISSUE" >/dev/null 2>&1; then
            echo "exists=true" >> "$GITHUB_OUTPUT"
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
            echo "No branch ai/issue-$ISSUE on origin. Coder likely blocked the ticket. Stopping here."
          fi

      - name: Reviewer
        id: reviewer
        if: steps.branch.outputs.exists == 'true'
        uses: anthropics/claude-code-action@v1
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          github_token: ${{ github.token }}
          prompt: "Read .github/prompts/reviewer.md and follow it exactly. The issue number is ${{ steps.pick.outputs.issue }}."
          claude_args: '--model ${{ env.CLAUDE_MODEL }} --max-turns 30 --dangerously-skip-permissions'

      - name: Upload reviewer log
        if: always() && steps.branch.outputs.exists == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: reviewer-log
          path: ${{ runner.temp }}/claude-execution-output.json
          if-no-files-found: ignore

      - name: Read verdict
        if: steps.branch.outputs.exists == 'true'
        id: verdict1
        run: |
          if grep -q "VERDICT: APPROVE" review.md; then
            echo "verdict=approve" >> "$GITHUB_OUTPUT"
          else
            echo "verdict=revise" >> "$GITHUB_OUTPUT"
          fi

      - name: Fix (only if revise)
        id: fix
        if: steps.branch.outputs.exists == 'true' && steps.verdict1.outputs.verdict == 'revise'
        uses: anthropics/claude-code-action@v1
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          github_token: ${{ github.token }}
          prompt: "Read .github/prompts/fix.md and follow it exactly. The issue number is ${{ steps.pick.outputs.issue }}."
          claude_args: '--model ${{ env.CLAUDE_MODEL }} --max-turns 40 --dangerously-skip-permissions'

      - name: Upload fix log
        if: always() && steps.branch.outputs.exists == 'true' && steps.verdict1.outputs.verdict == 'revise'
        uses: actions/upload-artifact@v4
        with:
          name: fix-log
          path: ${{ runner.temp }}/claude-execution-output.json
          if-no-files-found: ignore

      - name: Second review (only if revise)
        id: second_review
        if: steps.branch.outputs.exists == 'true' && steps.verdict1.outputs.verdict == 'revise'
        uses: anthropics/claude-code-action@v1
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          github_token: ${{ github.token }}
          prompt: "Read .github/prompts/reviewer.md and follow it exactly. The issue number is ${{ steps.pick.outputs.issue }}. This is the second and final review, after fixes."
          claude_args: '--model ${{ env.CLAUDE_MODEL }} --max-turns 30 --dangerously-skip-permissions'

      - name: Upload second review log
        if: always() && steps.branch.outputs.exists == 'true' && steps.verdict1.outputs.verdict == 'revise'
        uses: actions/upload-artifact@v4
        with:
          name: second-review-log
          path: ${{ runner.temp }}/claude-execution-output.json
          if-no-files-found: ignore

      # NOTE: we deliberately grep review.md directly here instead of using
      # steps.verdict1. After a fix cycle, review.md has been overwritten by the
      # second review, so the file is always the freshest verdict while verdict1
      # is stale. Do not "simplify" this to use verdict1.
      - name: Open PR and assign Pol
        if: steps.branch.outputs.exists == 'true'
        env:
          GH_TOKEN: ${{ github.token }}
          ISSUE: ${{ steps.pick.outputs.issue }}
        run: |
          BRANCH="ai/issue-$ISSUE"
          # || true tolerates reruns where the PR already exists
          gh pr create --head "$BRANCH" \
            --title "AI: $(gh issue view "$ISSUE" --json title --jq .title)" \
            --body-file review.md \
            --assignee legarspol || true
          if ! grep -q "VERDICT: APPROVE" review.md; then
            gh pr edit "$BRANCH" --add-label needs-human-attention
          fi
          gh issue edit "$ISSUE" --remove-label ready